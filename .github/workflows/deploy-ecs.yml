name: Deploy to ECS

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        required: true
        default: dev
  push:
    branches: master

permissions:
  contents: read

jobs:
  call-workflow:
    permissions:
      contents: read
      id-token: write # needed for AWS OIDC authentication
    uses: mbta/workflows/.github/workflows/deploy-ecs.yml@c76e5ccd9556fbea52bc41548f7ceed5985ad775 # v5.1.0
    with:
      app-name: arrow
      environment: ${{ github.event.inputs.environment || 'dev' }}
      docker-additional-tags: ${{ github.event.inputs.environment || 'dev' }}
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
      docker-repo: ${{ secrets.DOCKER_REPO }}
      slack-webhook: ${{ secrets.SLACK_WEBHOOK }}
